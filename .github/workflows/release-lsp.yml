name: Release LSP

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            asset: diff-tool-lsp-macos-aarch64.zip
            binary: diff-tool-lsp
            target: aarch64-apple-darwin
          - runner: macos-26-intel
            asset: diff-tool-lsp-macos-x86_64.zip
            binary: diff-tool-lsp
            target: x86_64-apple-darwin
          - runner: ubuntu-24.04
            asset: diff-tool-lsp-linux-x86_64.zip
            binary: diff-tool-lsp
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04
            asset: diff-tool-lsp-linux-aarch64.zip
            binary: diff-tool-lsp
            target: aarch64-unknown-linux-gnu
          - runner: windows-2025
            asset: diff-tool-lsp-windows-x86_64.zip
            binary: diff-tool-lsp.exe
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build LSP
        run: cargo build --release --target "${{ matrix.target }}" --manifest-path zed-diff-tool/server/Cargo.toml
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package LSP
        shell: bash
        run: |
          mkdir -p dist
          cp "zed-diff-tool/server/target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          cd dist
          7z a "../${{ matrix.asset }}" "${{ matrix.binary }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.asset }}
